
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2Frères Phone Glace Finder</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>2Frères Phone Glace Finder</h1>
    <input type="text" id="search" placeholder="Rechercher un modèle..." />
  </header>
  <main>
    <ul id="results"></ul>
  </main>
  <script src="data.js"></script>
  <script>
    const searchInput = document.getElementById("search");
    const resultsList = document.getElementById("results");

    searchInput.addEventListener("input", () => {
      const query = searchInput.value.toLowerCase();
      resultsList.innerHTML = "";

      if (query.length < 2) return;

      const filtered = phones.filter(p => p.model.toLowerCase().includes(query));
      filtered.forEach(phone => {
        const li = document.createElement("li");
        li.innerHTML = `<strong>${phone.model}</strong><br>Compatibles : ${phone.compatible.join(", ")}`;
        resultsList.appendChild(li);
      });
    });
  </script>
</body>
</html>
